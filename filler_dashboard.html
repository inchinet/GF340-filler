<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | GF340 Filler Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 20, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        textarea {
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            padding: 20px;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: 0.3s;
            line-height: 1.5;
            font-family: 'Fira Code', monospace;
        }

        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
        }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            font-size: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .keys-list {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        #copyStatus {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #00c853;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>GF340 Transfer Tool</h1>
        <p class="subtitle" id="detectedSummary">Paste your data on the left to detect row counts automatically.</p>

        <div class="layout">
            <div class="input-area">
                <textarea id="dataInput" placeholder="Copy-paste your .txt data here..."></textarea>
            </div>

            <div class="info-panel">
                <button class="btn-primary" onclick="generateScript()">Generate &amp; Copy Script</button>


                <div class="card">
                    <div class="card-title">Detected Fields</div>
                    <div class="keys-list" id="detectedKeys">
                        <span style="grid-column:span 2; color: var(--text-secondary); font-style: italic;">Paste data
                            to see detected fields...</span>
                    </div>
                </div>

                <div class="card" style="font-size: 0.85rem; color: var(--text-secondary);">
                    <b>How to use:</b><br>
                    1. Fill data on left<br>
                    2. Click Generate<br>
                    3. Go to Gov Portal<br>
                    4. Press F12 -> Console<br>
                    5. Ctrl+V -> Enter
                </div>
            </div>
        </div>
    </div>

    <div id="copyStatus">✨ Script Copied!</div>

    <script>
        const nameMapping = {
            // 甲部：個人資料
            "姓氏": "gf340from_field_name",
            "名字": "gf340from_field_name2",
            "中文姓名": "gf340from_field_chiname",
            "中文字碼1": "label0",
            "中文字碼2": "label1",
            "中文字碼3": "label2",
            "中文字碼4": "label3",
            "中文字碼5": "label4",
            "中文字碼6": "label5",
            "出生日": "dob0",
            "出生月": "dob1",
            "出生年": "dob2",
            "出生地點": "dobplace",
            "身份證1": "hkid0",
            "身份證2": "hkid1",
            "身份證3": "hkid2",
            "性別": "gf340from_field_sex",
            "永久居民": "gf340from_field_permres",
            "地址1": "gf340from_field_radd1",
            "地址2": "gf340from_field_radd2",
            "地區": "field.radd3",
            "國家": "myraddr",
            "電話": "gf340from_field_tele1",
            "電郵": "gf340from_dto004_email",

            // 甲部（底）/ 乙部 / 罪行
            "刑事罪行": "gf340from_field_guilty-",
            "殘疾": "gf340from_field_disabled-",

            // 第四部分（政府職位）
            "宣誓效忠": "gf340from_field_royaltyVow-",
            "紀律記錄": "gf340from_field_offence-",

            // 總全職工作年期
            "總工齡年": "field.emptyear",
            "總工齡月": "field.empmonth",

            // 第C部分（聲明）
            "同意1": "field.consent",
            "同意2": "field.consentA",
            "同意3": "field.consentB",

            // 第三部分：補充資料
            "學士學位": "gf340from_field_degtee",
            "中文會考06": "2006Result",
            "英文會考B": "SyllabusBResult",
            "基本法測試": "gf340from_field_blnstD-",
            "中文運用": "gf340from_field_creuc",
            "英文運用": "gf340from_field_creue",
            "能力傾向": "gf340from_field_creat"
        };

        const listMapping = {
            "居港由": "field.resfrom",
            "居港至": "field.resto",
            "居港年期": "field.resduration",
            "考試機構": "field.examissueauth",
            "考試日期": "field.examissuedate",
            "考試名稱": "field.examname",
            "科目": "field.examsubject",
            "成績": "field.examsubjectlvl",
            "院校": "field.edutype",
            "學歷級別": "field.educlass",
            "主修科目": "field.eduprog",
            "修讀方式": "field.edumode",
            "修讀由": "field.edufrom",
            "修讀至": "field.eduto",
            "機構": "field.empfirm",
            "職位": "field.emppos",
            "工作性質": "field.empnature",
            "由": "field.empfrom",
            "至": "field.empto",
            "全職": "field.emptype"
        };

        function parseData(text) {
            const lines = text.split('\n');
            const data = {};
            lines.forEach(line => {
                if (line.trim().startsWith('#')) return;
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const key = parts[0].trim();
                    const value = parts.slice(1).join(':').trim();
                    if (key) data[key] = value;
                }
            });
            return data;
        }

        function detectCounts(data) {
            const countOf = (prefix) => {
                const indices = Object.keys(data)
                    .filter(k => k.startsWith(prefix) && /\d+$/.test(k) && data[k] !== '')
                    .map(k => parseInt(k.replace(prefix, ''), 10))
                    .filter(n => !isNaN(n));
                return indices.length === 0 ? 0 : Math.max(...indices) + 1;
            };
            return {
                exams: countOf('考試機構'),
                edu: countOf('院校'),
                work: countOf('機構')
            };
        }

        function updateUI(data) {
            const { exams, edu, work } = detectCounts(data);
            const sub = document.getElementById('detectedSummary');
            const keysList = document.getElementById('detectedKeys');

            if (exams === 0 && edu === 0 && work === 0) {
                sub.textContent = 'Paste your data on the left to detect row counts automatically.';
                keysList.innerHTML = '<span style="grid-column:span 2; color: var(--text-secondary); font-style: italic;">Paste data to see detected fields...</span>';
                return;
            }

            sub.textContent = `Detected: 考試 (${exams}), 學歷 (${edu}), 工作 (${work}).`;

            const range = (n) => n > 0 ? `[0-${n - 1}]` : '(none)';
            const r = (n) => range(n);
            keysList.innerHTML = `
                <span>考試機構${r(exams)}</span><span>考試日期${r(exams)}</span>
                <span>考試名稱${r(exams)}</span><span>科目${r(exams)}</span>
                <span style="grid-column:span 2">成績${r(exams)}</span>
                <hr style="grid-column:span 2; opacity:0.1; margin: 4px 0;">
                <span>院校${r(edu)}</span><span>學歷級別${r(edu)}</span>
                <span>主修科目${r(edu)}</span><span>修讀由${r(edu)}</span>
                <span style="grid-column:span 2">修讀至${r(edu)}</span>
                <hr style="grid-column:span 2; opacity:0.1; margin: 4px 0;">
                <span>機構${r(work)}</span><span>職位${r(work)}</span>
                <span>工作性質${r(work)}</span><span>由${r(work)}</span>
                <span style="grid-column:span 2">至${r(work)}</span>
            `;
        }

        document.getElementById('dataInput').addEventListener('input', function () {
            updateUI(parseData(this.value));
        });

        async function generateScript() {
            const text = document.getElementById('dataInput').value;
            const data = parseData(text);

            let script = `(async function() {
    const data = ${JSON.stringify(data)};
    const nameMap = ${JSON.stringify(nameMapping)};
    const listMap = ${JSON.stringify(listMapping)};

    function setValue(el, val, index) {
        if (!el) return;
        
        const translations = {
            "YUEN LONG": "元朗", "TSUEN WAN": "荃灣", "TUEN MUN": "屯門", "TAI PO": "大埔",
            "SHA TIN": "沙田", "西貢": "西貢", "NORTH": "北區", "ISLANDS": "離島",
            "KWAI TSING": "葵青", "KWUN TONG": "觀塘", "WONG TAI SIN": "黃大仙",
            "KOWLOON CITY": "九龍城", "SHAM SHUI PO": "深水埗", "YAU TSIM MONG": "油尖旺",
            "CENTRAL AND WESTERN": "中西區", "WAN CHAI": "灣仔", "EASTERN": "東區", "SOUTHERN": "南區",
            "HONG KONG": "香港", "MAINLAND": "內地",
            "FULL TIME ON CAMPUS": "FULL TIME ON CAMPUS", "PART TIME ON CAMPUS": "PART TIME ON CAMPUS",
            "DISTANCE LEARNING": "DISTANCE LEARNING"
        };

        const upperVal = val.toUpperCase();
        const transVal = translations[upperVal];

        if (el.type === 'radio') {
            if (el.id.endsWith(val) || el.value === val) el.checked = true;
        } else if (el.type === 'checkbox') {
            if (['Y','YES','1','F'].includes(upperVal)) el.checked = true;
            else if (['N','NO','0','P'].includes(upperVal)) el.checked = false;
        } else if (el.tagName === 'SELECT') {
            let found = false;
            for(let i=0; i<el.options.length; i++) {
                const optText = el.options[i].text.toUpperCase();
                if(optText === upperVal || (transVal && optText === transVal)) { el.selectedIndex = i; found = true; break; }
            }
            if (!found) {
                for(let i=0; i<el.options.length; i++) {
                    const optText = el.options[i].text.toUpperCase();
                    if(optText.includes(upperVal) || (transVal && optText.includes(transVal))) { el.selectedIndex = i; break; }
                }
            }
        } else {
            el.value = val;
            let row = el.closest('tr');
            let sel = row ? row.querySelector('select') : null;
            if (sel) {
                let found = false;
                for(let i=0; i<sel.options.length; i++) {
                    const optText = sel.options[i].text.toUpperCase();
                    if(optText === upperVal || (transVal && optText === transVal)) { sel.selectedIndex = i; found = true; break; }
                }
                if (!found) {
                    for(let i=0; i<sel.options.length; i++) {
                        const optText = sel.options[i].text.toUpperCase();
                        if(optText.includes(upperVal) || (transVal && optText.includes(transVal))) { sel.selectedIndex = i; break; }
                    }
                }
                sel.dispatchEvent(new Event('change', {bubbles:true}));
            }
        }
        el.dispatchEvent(new Event('input', {bubbles:true}));
        el.dispatchEvent(new Event('change', {bubbles:true}));
        el.dispatchEvent(new Event('blur', {bubbles:true}));
    }

    async function ensureRows(rowName, btnSelector, countNeeded) {
        if (!rowName || countNeeded <= 1 || rowName.includes('res')) return;
        let current = document.querySelectorAll('[name="' + rowName + '"]').length;
        let btn = document.querySelector(btnSelector);

        if (!btn || current >= countNeeded) return;

        for (let i = 0; i < (countNeeded - current); i++) {
            btn.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, view: window }));
            btn.click();
            await new Promise(r => setTimeout(r, 2200));
        }
    }

    function detectMax(prefix) {
        const indices = Object.keys(data)
            .filter(k => k.startsWith(prefix) && /\\d+$/.test(k) && data[k] !== '')
            .map(k => parseInt(k.replace(prefix, ''), 10))
            .filter(n => !isNaN(n));
        return indices.length === 0 ? 0 : Math.max(...indices) + 1;
    }
    
    const maxExams = detectMax('考試機構');
    const maxEdu   = detectMax('院校');
    const maxWork  = detectMax('機構');

    if (document.querySelector('button[name="examaddentry"]')) {
        await ensureRows('field.examissueauth', 'button[name="examaddentry"]', maxExams);
    }
    if (document.querySelector('button[name="eduaddentry"]')) {
        await ensureRows('field.edutype', 'button[name="eduaddentry"]', maxEdu);
    }
    if (document.querySelector('button[name="empaddentry"]')) {
        await ensureRows('field.empfirm', 'button[name="empaddentry"]', maxWork);
    }

    for (let [key, id] of Object.entries(nameMap)) {
        if (data[key]) {
            const val = data[key].toUpperCase();
            if (['性別', '永久居民', '學士學位'].includes(key)) {
                let radio = document.getElementById(id + val) || document.getElementById(id + (val === 'Y' ? '1' : '2'));
                if (radio) setValue(radio, val);
            } else if (id.endsWith('-')) {
                let suffix = (val === 'Y' || val === 'YES') ? '1' : '2';
                let radio = document.getElementById(id.slice(0,-1) + suffix) || document.getElementById(id + suffix);
                if (radio) radio.checked = true;
            } else {
                let el = document.getElementById(id) || document.getElementsByName(id)[0];
                if (el) setValue(el, data[key]);
            }
        }
    }

    for (let i = 0; i < maxExams; i++) {
        let authSel = document.getElementsByName('sexamissueauth')[i];
        let authInp = document.getElementsByName('field.examissueauth')[i];
        if (data['考試機構'+i]) {
            if (authSel) {
                const txt = data['考試機構'+i].toUpperCase();
                for (let j = 0; j < authSel.options.length; j++) {
                    if (authSel.options[j].text.toUpperCase().includes(txt)) { authSel.selectedIndex = j; break; }
                }
                authSel.dispatchEvent(new Event('change',{bubbles:true}));
            }
            if (authInp) { authInp.value = data['考試機構'+i]; authInp.dispatchEvent(new Event('input',{bubbles:true})); }
        }

        let dateEl = document.getElementsByName('field.examissuedate')[i];
        if (dateEl && data['考試日期'+i]) { dateEl.value = data['考試日期'+i]; dateEl.dispatchEvent(new Event('change',{bubbles:true})); }

        let nameSel = document.getElementsByName('sexamname')[i];
        let nameInp = document.getElementsByName('field.examname')[i];
        if (data['考試名稱'+i]) {
            if (nameSel) {
                const txt = data['考試名稱'+i].toUpperCase();
                for (let j = 0; j < nameSel.options.length; j++) {
                    if (nameSel.options[j].text.toUpperCase().includes(txt)) { nameSel.selectedIndex = j; break; }
                }
                nameSel.dispatchEvent(new Event('change',{bubbles:true}));
            }
            if (nameInp) { nameInp.value = data['考試名稱'+i]; nameInp.dispatchEvent(new Event('input',{bubbles:true})); }
        }

        let subjEl = document.getElementsByName('field.examsubject')[i];
        if (subjEl && data['科目'+i]) { subjEl.value = data['科目'+i]; subjEl.dispatchEvent(new Event('change',{bubbles:true})); }

        let gradeEl = document.getElementsByName('field.examsubjectlvl')[i];
        if (gradeEl && data['成績'+i]) { gradeEl.value = data['成績'+i]; gradeEl.dispatchEvent(new Event('change',{bubbles:true})); }
    }

    const skipPrefixes = new Set(['考試機構','考試日期','考試名稱','科目','成績']);
    for (let [prefix, nameAttr] of Object.entries(listMap)) {
        if (skipPrefixes.has(prefix)) continue;
        for (let i = 0; i < 15; i++) {
            let key = prefix + i;
            if (data[key]) {
                if (prefix === '全職') {
                    const firmBox = document.getElementsByName('field.empfirm')[i];
                    const row = firmBox ? firmBox.closest('tr') : null;
                    if (row) {
                        const isFT = ['Y','YES','1','F'].includes(data[key].toUpperCase());
                        const cbs = Array.from(row.querySelectorAll('input[type="checkbox"]'));
                        let target = isFT ? cbs.find(c => c.value === 'F' || c.value === '1') : cbs.find(c => c.value === 'P' || c.value === '0');
                        if (!target) target = isFT ? cbs[0] : cbs[1];
                        if (target && !target.checked) target.click();
                    }
                    continue;
                }
                let el = document.getElementsByName(nameAttr)[i] || document.getElementById(prefix + i);
                if (!el) {
                    if (prefix === '由') el = document.getElementsByName('field.empfrom')[i];
                    else if (prefix === '至') el = document.getElementsByName('field.empto')[i];
                    else if (prefix === '修讀由') el = document.getElementsByName('field.edufrom')[i];
                    else if (prefix === '修讀至') el = document.getElementsByName('field.eduto')[i];
                }
                if (el) setValue(el, data[key], i);
            }
        }
    }

    alert("AntiGravity: Transfer complete!");
})();`;

            await navigator.clipboard.writeText(script);
            const status = document.getElementById('copyStatus');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 3000);
        }
    </script>
</body>

</html>
